{% extends "base.html" %}
{% block title %}Jarvis Chat{% endblock %}

{% block content %}
<style>
.chat-wrap {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 57px);
  max-width: 780px;
  margin: 0 auto;
  padding: 0 1rem;
}

/* ── Header ───────────────────────────── */
.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 0 0.75rem;
  border-bottom: 1px solid var(--surface2);
  flex-shrink: 0;
}
.chat-identity { display: flex; align-items: center; gap: 0.75rem; }
.jarvis-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1rem; color: white; flex-shrink: 0;
}
.chat-identity h2 { font-size: 1.1rem; font-weight: 600; margin: 0; }
.chat-identity p  { font-size: 0.78rem; color: var(--muted); margin: 0; }

.status-badge {
  display: flex; align-items: center; gap: 0.4rem;
  font-size: 0.78rem; color: var(--muted);
  padding: 0.3rem 0.75rem;
  background: var(--surface); border-radius: 999px;
  border: 1px solid var(--surface2); transition: all 0.25s;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--success); box-shadow: 0 0 6px var(--success);
  transition: all 0.25s;
}
.status-badge.listening .status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse-dot 1s infinite; }
.status-badge.thinking  .status-dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse-dot 1s infinite; }
.status-badge.speaking  .status-dot { background: var(--warning); box-shadow: 0 0 8px var(--warning); animation: pulse-dot 0.6s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
.status-badge.listening { color:var(--text); border-color: var(--accent)44; }
.status-badge.thinking  { color:var(--text); border-color: var(--accent2)44; }
.status-badge.speaking  { color:var(--text); border-color: var(--warning)44; }

/* ── Messages ─────────────────────────── */
.messages {
  flex: 1; overflow-y: auto;
  padding: 1.25rem 0;
  display: flex; flex-direction: column; gap: 1.1rem;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

.msg-row { display: flex; gap: 0.65rem; align-items: flex-end; }
.msg-row.user { flex-direction: row-reverse; }

.msg-icon {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; flex-shrink: 0; margin-bottom: 2px;
}
.msg-row.jarvis .msg-icon { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
.msg-row.user   .msg-icon { background: var(--surface2); color: var(--muted); }

.bubble {
  max-width: 72%; padding: 0.65rem 0.95rem;
  border-radius: 16px; font-size: 0.9rem; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
}
.msg-row.jarvis .bubble {
  background: var(--surface); border: 1px solid var(--surface2);
  border-bottom-left-radius: 4px; color: var(--text);
}
.msg-row.user .bubble {
  background: var(--accent); color: white; border-bottom-right-radius: 4px;
}
.bubble.typing::after { content:"▌"; animation: blink 0.75s step-end infinite; }
@keyframes blink { 50%{opacity:0} }

.replay-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 0.75rem; padding: 2px 4px;
  opacity: 0; transition: opacity 0.15s; align-self: flex-end; margin-left: 2px;
}
.msg-row.jarvis:hover .replay-btn { opacity: 1; }
.replay-btn:hover { color: var(--text); }

/* ── Input area ───────────────────────── */
.input-area { flex-shrink: 0; padding: 0.75rem 0 1rem; border-top: 1px solid var(--surface2); }

.input-row {
  display: flex; align-items: flex-end; gap: 0.5rem;
  background: var(--surface); border: 1px solid var(--surface2);
  border-radius: 14px; padding: 0.5rem 0.5rem 0.5rem 1rem;
  transition: border-color 0.2s;
}
.input-row:focus-within { border-color: var(--accent)88; }

#msg-input {
  flex: 1; background: none; border: none; color: var(--text);
  font-size: 0.9rem; font-family: inherit; outline: none;
  resize: none; max-height: 120px; line-height: 1.5; padding: 0.25rem 0;
}
#msg-input::placeholder { color: var(--muted); }

.icon-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.15s, transform 0.1s; flex-shrink: 0;
}
.icon-btn:active { transform: scale(0.92); }
.icon-btn:disabled { opacity: 0.35; cursor: default; }

#mic-btn { background: var(--surface2); color: var(--muted); }
#mic-btn:hover { background: var(--accent)33; color: var(--accent); }
#mic-btn.listening {
  background: var(--accent); color: white;
  animation: mic-pulse 1.2s infinite;
}
@keyframes mic-pulse {
  0%   { box-shadow: 0 0 0 0   var(--accent)88; }
  70%  { box-shadow: 0 0 0 10px var(--accent)00; }
  100% { box-shadow: 0 0 0 0   var(--accent)00; }
}
#send-btn { background: var(--accent); color: white; }
#send-btn:hover { background: #6b5ce7; }

.bottom-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 0.5rem; padding: 0 0.25rem;
  font-size: 0.75rem; color: var(--muted);
}
.voice-toggle { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; user-select: none; }
.voice-toggle input { display: none; }
.pill {
  width: 32px; height: 18px; background: var(--surface2); border-radius: 18px;
  position: relative; transition: background 0.2s;
}
.pill::after {
  content:""; position: absolute; width: 12px; height: 12px; background: white;
  border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s;
}
.voice-toggle input:checked ~ .pill { background: var(--accent2); }
.voice-toggle input:checked ~ .pill::after { transform: translateX(14px); }
.hint { color: var(--muted); font-size: 0.72rem; }
</style>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="chat-identity">
      <div class="jarvis-avatar">J</div>
      <div><h2>Jarvis</h2><p>Personal AI assistant</p></div>
    </div>
    <div class="status-badge" id="status-badge">
      <span class="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Type a message or click the mic…" rows="1"></textarea>
      <button class="icon-btn" id="mic-btn" title="Click to speak">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="icon-btn" id="send-btn" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="bottom-bar">
      <label class="voice-toggle" title="Jarvis speaks replies aloud">
        <input type="checkbox" id="voice-out" checked>
        <span class="pill"></span>
        <span id="voice-label">Voice on</span>
      </label>
      <span class="hint" id="hint-text">Click mic to speak · Enter to send</span>
    </div>
  </div>
</div>

<script>
const badge      = document.getElementById('status-badge');
const statusTxt  = document.getElementById('status-text');
const msgs       = document.getElementById('messages');
const inp        = document.getElementById('msg-input');
const micBtn     = document.getElementById('mic-btn');
const sendBtn    = document.getElementById('send-btn');
const voiceOut   = document.getElementById('voice-out');
const voiceLabel = document.getElementById('voice-label');
const hintText   = document.getElementById('hint-text');

let sending    = false;
let micActive  = false;
let curAudio   = null;

// ── Status ──────────────────────────────────────────────────
function setStatus(state, label) {
  badge.className = 'status-badge ' + state;
  statusTxt.textContent = label;
}

// ── Voice output toggle ─────────────────────────────────────
voiceOut.addEventListener('change', () => {
  voiceLabel.textContent = voiceOut.checked ? 'Voice on' : 'Voice off';
  if (!voiceOut.checked && curAudio) { curAudio.pause(); curAudio = null; setStatus('', 'Ready'); }
});

// ── Add message ─────────────────────────────────────────────
function addMsg(role, text) {
  const row    = document.createElement('div');
  row.className = 'msg-row ' + role;
  const icon   = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = role === 'jarvis' ? 'J' : 'Y';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(icon);
  row.appendChild(bubble);
  if (role === 'jarvis') {
    const rb = document.createElement('button');
    rb.className = 'replay-btn'; rb.title = 'Play again'; rb.textContent = '🔊';
    rb.onclick = () => playTTS(bubble.textContent, rb);
    row.appendChild(rb);
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

// ── TTS ─────────────────────────────────────────────────────
async function playTTS(text, btn) {
  if (curAudio) { curAudio.pause(); curAudio = null; }
  setStatus('speaking', 'Speaking…');
  if (btn) btn.textContent = '⏸';
  try {
    const res  = await fetch('/api/tts', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text }),
    });
    if (!res.ok) throw new Error();
    const blob = await res.blob();
    const audio = new Audio(URL.createObjectURL(blob));
    curAudio = audio;
    audio.onended = () => {
      curAudio = null;
      if (btn) btn.textContent = '🔊';
      setStatus('', 'Ready');
    };
    audio.play();
  } catch {
    if (btn) btn.textContent = '🔊';
    setStatus('', 'Ready');
  }
}

// ── Send ────────────────────────────────────────────────────
async function send() {
  const text = inp.value.trim();
  if (!text || sending) return;
  sending = true;
  inp.value = ''; inp.style.height = 'auto';
  inp.disabled = true; sendBtn.disabled = true;

  addMsg('user', text);
  setStatus('thinking', 'Thinking…');

  const bubble = addMsg('jarvis');
  bubble.classList.add('typing');

  let reply = '';
  try {
    const res = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: text }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      reply += dec.decode(value, { stream: true });
      bubble.textContent = reply;
      msgs.scrollTop = msgs.scrollHeight;
    }
  } catch (err) {
    reply = `Error: ${err.message}`;
    bubble.textContent = reply;
  }

  bubble.classList.remove('typing');
  sending = false;
  inp.disabled = false;
  sendBtn.disabled = false;

  if (voiceOut.checked && reply && !reply.startsWith('Error:')) {
    const rb = bubble.parentElement.querySelector('.replay-btn');
    await playTTS(reply, rb);
  } else {
    setStatus('', 'Ready');
  }
  inp.focus();
}

// ── Textarea ────────────────────────────────────────────────
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

// ── Mic (Web Speech API) ────────────────────────────────────
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRec) {
  micBtn.style.display = 'none';
  hintText.textContent = 'Enter to send  ·  mic not supported in this browser';
} else {
  const rec = new SpeechRec();
  rec.lang = 'en-US';
  rec.interimResults = true;
  rec.continuous = false;

  rec.onstart = () => {
    micActive = true;
    micBtn.classList.add('listening');
    setStatus('listening', 'Listening…');
    hintText.textContent = 'Speak now… click mic again to cancel';
  };

  rec.onresult = e => {
    let out = '';
    for (let i = e.resultIndex; i < e.results.length; i++)
      out += e.results[i][0].transcript;
    inp.value = out.trim();
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  };

  rec.onend = () => {
    micActive = false;
    micBtn.classList.remove('listening');
    hintText.textContent = 'Click mic to speak · Enter to send';
    const text = inp.value.trim();
    if (text) {
      send();
    } else {
      setStatus('', 'Ready');
    }
  };

  rec.onerror = e => {
    micActive = false;
    micBtn.classList.remove('listening');
    setStatus('', 'Ready');
    hintText.textContent = 'Click mic to speak · Enter to send';
    if (e.error === 'not-allowed') {
      hintText.textContent = '⚠ Microphone access denied — check browser permissions';
    }
  };

  micBtn.addEventListener('click', () => {
    if (sending) return;
    if (micActive) {
      rec.stop();
    } else {
      if (curAudio) { curAudio.pause(); curAudio = null; }
      inp.value = '';
      rec.start();
    }
  });
}

// ── Greeting on load ────────────────────────────────────────
window.addEventListener('load', () => {
  addMsg('jarvis', "Hello! I'm Jarvis. You can type a message or click the microphone and speak — I'm listening.");
  inp.focus();
});
</script>
{% endblock %}
