version: "3"
output: interleaved
dotenv: [".env.local"]

tasks:
  post_create:
    desc: "Runs after this template is instantiated as a Sandbox or Bootstrap"
    cmds:
      - echo -e "To try the new agent directly in your terminal:\r\n"
      - echo -e "\tcd {{.ROOT_DIR}}\r"
      - echo -e "\tuv sync\r"
      - echo -e "\tuv run src/agent.py download-files\r"
      - echo -e "\tuv run src/agent.py console\r\n"

  install:
    desc: "Bootstrap application for local development"
    cmds:
      - "uv sync"
  dev:
    interactive: true
    cmds:
      - "uv run src/agent.py dev"

  dashboard:
    desc: "Run the automation dashboard on port 8080"
    cmds:
      - "uv run uvicorn src.dashboard.app:app --host 0.0.0.0 --port 8080 --reload"

  email-worker:
    desc: "Run the email summariser background worker"
    cmds:
      - "uv run python -m workers.email_summariser"

  slack:
    desc: "Run the Slack Socket Mode bot"
    cmds:
      - "uv run python -m integrations.slack.bot"

  discord:
    desc: "Run the Discord task bot"
    cmds:
      - "uv run python -m integrations.discord.bot"

  gmail-setup:
    desc: "One-time Gmail OAuth setup — opens browser for consent"
    cmds:
      - "uv run python -m integrations.gmail.client"

  calendar-setup:
    desc: "One-time Google Calendar OAuth setup (combined Gmail + Calendar scopes)"
    cmds:
      - "uv run python -m integrations.calendar.client"

  presence:
    desc: "Run the presence monitor (auto-mutes Jarvis during calendar meetings)"
    cmds:
      - "uv run python -m workers.presence_monitor"

  start:
    desc: "Start all Jarvis services in parallel (dashboard, discord, email, presence, slack)"
    deps:
      - dashboard
      - discord
      - email-worker
      - presence
      - slack